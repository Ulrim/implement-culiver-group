<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>뉴스룸 관리자 — 컬리버 그룹</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <div class="admin-topbar">
    <div class="brand">CULIVER GROUP<small>뉴스룸 관리자</small></div>
    <button class="btn btn-ghost hidden" id="logoutBtn">로그아웃</button>
  </div>

  <div class="admin-wrap">
    <!-- login -->
    <div class="login-card" id="loginView">
      <h1>관리자 로그인</h1>
      <p>뉴스룸 게시글을 작성·수정·삭제하려면 로그인하세요.</p>
      <form id="loginForm">
        <div class="field">
          <label for="loginPassword">비밀번호</label>
          <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginSubmit" style="width:100%">로그인</button>
        <p class="error-msg" id="loginError"></p>
      </form>
    </div>

    <!-- dashboard: list -->
    <div id="listView" class="hidden">
      <div class="admin-head-row">
        <h2>뉴스룸 게시글</h2>
        <button class="btn btn-primary" id="newBtn">+ 새 글 작성</button>
      </div>
      <table class="news-table" id="newsTable">
        <thead>
          <tr><th>날짜</th><th>테마</th><th>태그</th><th>제목</th><th>상태</th><th></th></tr>
        </thead>
        <tbody id="newsTableBody"></tbody>
      </table>
      <p class="empty-state hidden" id="emptyState">아직 작성된 글이 없습니다.</p>
    </div>

    <!-- dashboard: editor -->
    <div id="editorView" class="hidden">
      <div class="admin-head-row">
        <h2 id="editorTitle">새 글 작성</h2>
        <button class="btn btn-line" id="cancelEditBtn">← 목록으로</button>
      </div>
      <div class="editor-card">
        <form id="editorForm">
          <input type="hidden" id="fId">
          <div class="editor-grid">
            <div class="field">
              <label for="fTheme">테마 (색상·연결 계열사)</label>
              <select id="fTheme" required>
                <option value="culiver">컬리버 CULIVER</option>
                <option value="amp">에이엠피 AMP</option>
                <option value="cobaltive">코발티브 COBALTIVE</option>
                <option value="susinje">수신제팜 SUSINJE FARM</option>
                <option value="group">컬리버 그룹 (공지)</option>
              </select>
            </div>
            <div class="field">
              <label for="fTag">분류</label>
              <select id="fTag" required>
                <option value="press">보도자료 Press</option>
                <option value="updates">소식 Updates</option>
                <option value="hiring">채용 Hiring</option>
              </select>
            </div>
            <div class="field">
              <label for="fDate">날짜</label>
              <input type="date" id="fDate" required>
            </div>
            <div class="field full">
              <label for="fPhotoFile">대표 이미지 (선택)</label>
              <div class="photo-upload">
                <div class="photo-preview" id="photoPreview" role="img" aria-label="이미지 없음"><span class="ph-empty" aria-hidden="true">이미지 없음</span></div>
                <div class="photo-upload-controls">
                  <input type="file" id="fPhotoFile" accept="image/jpeg,image/png,image/webp,image/gif">
                  <p class="hint" id="photoStatus" aria-live="polite">jpg/png/webp/gif, 3MB 이하. 업로드하면 자동으로 리사이즈되어 JPG로 저장됩니다.</p>
                  <label for="fPhoto" style="margin-top:10px;display:block">또는 이미지 URL 직접 입력</label>
                  <input type="text" id="fPhoto" placeholder="예: news-1.jpg 또는 https://...">
                </div>
              </div>
            </div>
            <div class="field full">
              <label>언어별 제목·본문</label>
              <p class="hint">한국어·English는 필수입니다. 나머지 언어는 필요한 만큼만 채우세요 — 비워두면 해당 언어로는 기사가 표시되지 않습니다. 자동 번역은 지원하지 않습니다.</p>
              <div class="lang-tabs" id="langTabs" role="group" aria-label="언어 선택">
                <button type="button" class="lang-tab active" data-lang="Ko" aria-pressed="true" aria-label="한국어">한국어<span class="req">*</span></button>
                <button type="button" class="lang-tab" data-lang="En" aria-pressed="false" aria-label="English">English<span class="req">*</span></button>
                <button type="button" class="lang-tab" data-lang="Vi" aria-pressed="false" aria-label="Tiếng Việt">Tiếng Việt</button>
                <button type="button" class="lang-tab" data-lang="Th" aria-pressed="false" aria-label="ภาษาไทย">ภาษาไทย</button>
                <button type="button" class="lang-tab" data-lang="Ja" aria-pressed="false" aria-label="日本語">日本語</button>
                <button type="button" class="lang-tab" data-lang="Zh" aria-pressed="false" aria-label="中文">中文</button>
              </div>
              <!-- required is enforced in JS (assets/js/admin.js), not via the
                   HTML required attribute: a required field inside a hidden
                   (inactive-tab) panel is silently exempted from native
                   constraint validation, which would let Save submit an
                   incomplete article with no error shown at all -->
              <div class="lang-panel" data-lang="Ko">
                <div class="field"><label for="fTitleKo">제목</label><input type="text" id="fTitleKo"></div>
                <div class="field"><label for="fBodyKo">본문 — 한 줄 = 한 문단</label><textarea id="fBodyKo"></textarea></div>
              </div>
              <div class="lang-panel hidden" data-lang="En">
                <div class="field"><label for="fTitleEn">제목</label><input type="text" id="fTitleEn"></div>
                <div class="field"><label for="fBodyEn">본문 — 한 줄 = 한 문단</label><textarea id="fBodyEn"></textarea></div>
              </div>
              <div class="lang-panel hidden" data-lang="Vi">
                <div class="field"><label for="fTitleVi">제목</label><input type="text" id="fTitleVi"></div>
                <div class="field"><label for="fBodyVi">본문 — 한 줄 = 한 문단</label><textarea id="fBodyVi"></textarea></div>
              </div>
              <div class="lang-panel hidden" data-lang="Th">
                <div class="field"><label for="fTitleTh">제목</label><input type="text" id="fTitleTh"></div>
                <div class="field"><label for="fBodyTh">본문 — 한 줄 = 한 문단</label><textarea id="fBodyTh"></textarea></div>
              </div>
              <div class="lang-panel hidden" data-lang="Ja">
                <div class="field"><label for="fTitleJa">제목</label><input type="text" id="fTitleJa"></div>
                <div class="field"><label for="fBodyJa">본문 — 한 줄 = 한 문단</label><textarea id="fBodyJa"></textarea></div>
              </div>
              <div class="lang-panel hidden" data-lang="Zh">
                <div class="field"><label for="fTitleZh">제목</label><input type="text" id="fTitleZh"></div>
                <div class="field"><label for="fBodyZh">본문 — 한 줄 = 한 문단</label><textarea id="fBodyZh"></textarea></div>
              </div>
            </div>
            <div class="field full checkbox-field">
              <input type="checkbox" id="fPublished" checked>
              <label for="fPublished" style="margin:0">게시함 (체크 해제 시 임시저장 — 관리자만 미리보기 가능)</label>
            </div>
          </div>
          <div class="editor-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">저장</button>
            <button type="button" class="btn btn-danger hidden" id="deleteBtn">삭제</button>
          </div>
          <p class="error-msg" id="editorError"></p>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
